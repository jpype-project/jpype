# JPype Release pipeline

# NOTES:
# - This pipeline triggers only on changes to release branches or versioning files.
# - ManyLinux builds cover major architectures (x86_64, aarch64, i686).
# - All jobs use JDK 11 (LTS); newer JDKs (e.g., JDK 22) are not yet available on Azure.
# - Python versions are updated as new releases become available on Azure-hosted agents.
# - macOS and Windows wheels are built for all supported Python versions.
# - Artifact publishing is handled consistently across all platforms.

trigger: none
pr:
  branches:
    include:
      - releases/*
  paths:
    include:
      - .bumpversion.cfg
      - .azure/release.yml

parameters:
  - name: build_profile
    displayName: "Target Build Profile"
    type: string
    default: standard
    values:
      - standard     # ManyLinux, Windows, OSX
      - musl         # Musllinux (x86_64 and aarch64)
      - exotic_arch  # ManyLinux2014 specialized hardware (ppc64le, s390x)
      - all          # Full Release: Run absolutely every target platform

  - name: build_tag
    displayName: "Wheel build tag (e.g. 0, 1, 2 — increment to re-upload same version to PyPI)"
    default: '0'
    type: string

variables:
  - name: package_name
    value: jpype1
  - name: SKBUILD_WHEEL_BUILD_TAG
    value: ${{ parameters.build_tag }}
  - name: python_versions # Resolved at compile time for matrix generation (Win, OSX only).
    value: '3.8 3.9 3.10 3.11 3.12 3.13 3.14'
  - group: Secrets # currently contains a public_repo scoped Github token to avoid rate limiting (old) Python interpreter downloads.

stages:
- stage: Initial
  jobs:
  - job: SourceDistribution
    pool:
      vmImage: "ubuntu-latest"
    steps:
    - template: scripts/sdist.yml
      parameters:
        artifact: true
    - template: scripts/ivy.yml

- stage: Package
  jobs:
  # x86_64 build
  - job: ManyLinux_x86_64
    condition: or(eq('${{ parameters.build_profile }}', 'standard'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build manylinux_2_28_x86_64"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: x86_64
      plat: manylinux_2_28_x86_64
      image: quay.io/pypa/manylinux_2_28_x86_64
      python.architecture: x64
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  # aarch64 build
  - job: ManyLinux_aarch64
    condition: or(eq('${{ parameters.build_profile }}', 'standard'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build manylinux_2_28_aarch64"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: aarch64
      plat: manylinux_2_28_aarch64
      image: quay.io/pypa/manylinux_2_28_aarch64
      python.architecture: aarch64
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  # i686 build
  - job: ManyLinux_i686
    condition: or(eq('${{ parameters.build_profile }}', 'standard'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build manylinux_2_28_i686"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: i686
      plat: manylinux_2_28_i686
      image: quay.io/pypa/manylinux_2_28_i686
      python.architecture: x86
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  # Consider adding these after we have the reverse bridge.
  # I don't want to promise something I can't deliver long term.
  - job: Musllinux_x86_64
    condition: or(eq('${{ parameters.build_profile }}', 'musl'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build musllinux_1_1_x86_64"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: x86_64
      plat: musllinux_1_1_x86_64
      image: quay.io/pypa/musllinux_1_1_x86_64
      python.architecture: x64
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  - job: Musllinux_aarch64
    condition: or(eq('${{ parameters.build_profile }}', 'musl'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build musllinux_1_1_aarch64"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: aarch64
      plat: musllinux_1_1_aarch64
      image: quay.io/pypa/musllinux_1_1_aarch64
      python.architecture: aarch64
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  - job: Manylinux2014_ppc64le
    condition: or(eq('${{ parameters.build_profile }}', 'exotic_arch'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build manylinux2014_ppc64le"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: ppc64le
      plat: manylinux2014_ppc64le
      image: quay.io/pypa/manylinux2014_ppc64le
      python.architecture: ppc64le
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  - job: Manylinux2014_s390x
    condition: or(eq('${{ parameters.build_profile }}', 'exotic_arch'), eq('${{ parameters.build_profile }}', 'all'))
    timeoutInMinutes: 360
    displayName: "Build manylinux2014_s390x"
    pool:
      vmImage: "ubuntu-latest"
    variables:
      arch: s390x
      plat: manylinux2014_s390x
      image: quay.io/pypa/manylinux2014_s390x
      python.architecture: s390x
    steps:
      - template: scripts/deps.yml
      - template: scripts/wheels-linux.yml
      - template: scripts/publish-dist.yml

  - job: Windows_x64
    condition: or(eq('${{ parameters.build_profile }}', 'standard'), eq('${{ parameters.build_profile }}', 'all'))
    strategy:
      matrix:
        ${{ each version in split(variables['python_versions'], ' ') }}:
          ${{ replace(format('Python{0}', version), '.', '') }}:
            python.version: ${{ version }}
            python.architecture: 'x64'
    pool:
      vmImage: "windows-2022"
    steps:
    - template: scripts/deps.yml
    - template: scripts/python.yml
      parameters:
        version: '$(python.version)'
        architecture: '$(python.architecture)'
        githubToken: '$(githubToken)'
    - template: scripts/jdk.yml
      parameters:
        version: '11'
    - template: scripts/wheels.yml
    - template: scripts/publish-dist.yml

  - job: OSX
    condition: or(eq('${{ parameters.build_profile }}', 'standard'), eq('${{ parameters.build_profile }}', 'all'))
    variables:
      MACOSX_DEPLOYMENT_TARGET: "11.0" # Keeps your wheels backwards-compatible
    strategy:
      matrix:
        ${{ each version in split(variables['python_versions'], ' ') }}:
          ${{ replace(format('Python{0}', version), '.', '') }}:
            python.version: ${{ version }}
            python.architecture: 'x64'
            ARCHFLAGS: "-arch arm64 -arch x86_64"
    pool:
      vmImage: "macos-14"
    steps:
    - template: scripts/deps.yml
    - template: scripts/python.yml
      parameters:
        version: '$(python.version)'
        architecture: 'x64'  # we can cross-build arm64 on x64
        githubToken: '$(githubToken)'
    - template: scripts/jdk.yml
      parameters:
        version: '11'
    - template: scripts/wheels.yml
    - template: scripts/publish-dist.yml
